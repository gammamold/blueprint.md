# Blueprint Pipeline — runs only on music-related .md (blueprints/music/)
name: Blueprint Pipeline

on:
  push:
    paths:
      - 'blueprints/music/**/*.md'
      - 'blueprints/music/*.md'
  pull_request:
    paths:
      - 'blueprints/music/**/*.md'
      - 'blueprints/music/*.md'

jobs:
  test-blueprint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r blueprint_pipeline/requirements.txt

      - name: Get changed music .md files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BEFORE="${{ github.event.pull_request.base.sha }}"
          else
            BEFORE="${{ github.event.before }}"
          fi
          AFTER="${{ github.sha }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            FILES=$(find blueprints/music -name "*.md" 2>/dev/null | tr '\n' ' ')
          else
            FILES=$(git diff --name-only "$BEFORE" "$AFTER" -- blueprints/music/ | tr '\n' ' ' || true)
          fi
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Run pipeline
        working-directory: ${{ github.workspace }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          FILES="${{ steps.changed.outputs.files }}"
          if [ -z "$FILES" ]; then
            echo "No music blueprint .md files changed, skipping."
            exit 0
          fi
          for file in $FILES; do
            [ -z "$file" ] && continue
            echo "Processing $file"
            python blueprint_pipeline/pipeline.py --file "$file"
          done
